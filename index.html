<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gerwing Steinwerke</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f4f7f9;color:#0b2230;}
    .brand{color:#0a5b7a;font-weight:800;letter-spacing:.2px}
    .work-card{border-radius:16px; box-shadow:0 6px 24px rgba(0,0,0,.08);}
    .work-btn{
      background:#0a5b7a;border:none;border-radius:14px;
      padding:18px 26px;font-weight:800;font-size:20px;
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
      box-shadow:0 8px 18px rgba(10,91,122,.18);
      min-width:220px;
    }
    .work-btn:hover{filter:brightness(1.12); transform:translateY(-2px); box-shadow:0 12px 26px rgba(10,91,122,.28);}
    .work-btn:active{transform:translateY(0px); filter:brightness(0.98);}
  </style>
</head>
<body>
  <div class="container py-5" style="max-width:1100px">
    <div class="d-flex align-items-end justify-content-between flex-wrap gap-3 mb-4">
      <h1 class="display-5 brand m-0">Gerwing Steinwerke</h1>
    </div>

    <div class="card work-card p-4">
      <h2 class="h5 mb-2">Preisrechner öffnen</h2>
      <p class="text-muted mb-4">Bitte Werk auswählen.</p>

      <div class="d-flex flex-wrap gap-3">
        <a class="btn btn-primary work-btn" href="preisrechner.html?werk=holdorf">Werk Holdorf</a>
        <a class="btn btn-primary work-btn" href="preisrechner.html?werk=clausnitz">Werk Clausnitz</a>
      </div>
    </div>
  </div>
</body>
</html>
