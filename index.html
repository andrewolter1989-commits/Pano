<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Preisrechner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>Preisrechner</h2>

  <div class="form-row">
    <div>
      <label>PLZ Empfänger</label>
      <input id="plz" type="text" placeholder="z. B. 27777" />
    </div>

    <div>
      <label>Paletten</label>
      <input id="psp" type="number" min="1" value="1" />
    </div>
  </div>

  <div class="actions">
    <button onclick="calculate()">Berechnen</button>
    <button class="secondary" onclick="resetForm()">Zurücksetzen</button>
  </div>

  <div id="error" class="error"></div>

  <div id="results" class="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>
